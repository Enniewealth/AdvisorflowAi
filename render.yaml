services:
  - type: web
    name: advisorflow-ai-api
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_education"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: advisorflow-ai-db
          property: connectionString

databases:
  - name: advisorflow-ai-db
    databaseName: advisorflow
    user: advisorflow
